<!DOCTYPE html>
<html>
<head>
  <title>Arcade Hub</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* 🔥 LOADING SCREEN */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      z-index: 9999;
    }

    .spin {
      width: 60px;
      height: 60px;
      border: 5px solid #333;
      border-top: 5px solid cyan;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* fade in main content */
    #content {
      display: none;
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    /* glitch title */
    .glow {
      font-size: 50px;
      text-shadow: 0 0 10px cyan, 0 0 25px blue;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: cyan;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px cyan;
    }
  </style>
</head>

<body>

<!-- 🔄 LOADING SCREEN -->
<div id="loader">
  <div class="spin"></div>
  <p>Loading Arcade Hub...</p>
</div>

<!-- 🎮 MAIN CONTENT -->
<div id="content">
  <h1 class="glow">ARCADE HUB</h1>
  <p>Welcome to the neon zone</p>

  <a class="btn" href="games.html">Enter Games</a>
</div>

<script>
  // fake loading screen timer
  window.onload = function () {
    setTimeout(() => {
      document.getElementById("loader").style.display = "none";
      document.getElementById("content").style.display = "block";
    }, 2000); // 2 second load
  };
</script>

</body>
</html>
