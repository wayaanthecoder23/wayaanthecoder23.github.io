<!DOCTYPE html>
<html>
<head>
  <title>Games</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #111, #000);
      font-family: sans-serif;
      color: white;
    }

    h1 {
      text-align: center;
      margin-top: 30px;
      font-size: 40px;
      text-shadow: 0 0 10px cyan, 0 0 25px blue;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 25px;
      padding: 40px;
    }

    .card {
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.3s;
    }

    .machine {
      width: 140px;
      height: 180px;
      background: linear-gradient(#222, #111);
      border: 2px solid cyan;
      border-radius: 15px;
      box-shadow: 0 0 15px #00ffff33;
      position: relative;
      transition: 0.3s;
    }

    .screen {
      width: 110px;
      height: 70px;
      background: #000;
      border: 2px solid #00ffff55;
      margin: 15px auto 0;
      border-radius: 8px;
      box-shadow: inset 0 0 10px cyan;
    }

    .buttons {
      width: 60px;
      height: 10px;
      background: cyan;
      margin: 20px auto 0;
      border-radius: 5px;
      opacity: 0.6;
    }

    .title {
      margin-top: 10px;
      opacity: 0.8;
      transition: 0.3s;
    }

    .card:hover .machine {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 0 25px cyan;
    }

    .card:hover .title {
      opacity: 1;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<h1>ARCADE ROOM</h1>

<div class="grid">

  <a href="#" class="card">
    <div class="machine"><div class="screen"></div><div class="buttons"></div></div>
    <div class="title">Racing Drift</div>
  </a>

  <a href="#" class="card">
    <div class="machine"><div class="screen"></div><div class="buttons"></div></div>
    <div class="title">Space Shooter</div>
  </a>

  <a href="#" class="card">
    <div class="machine"><div class="screen"></div><div class="buttons"></div></div>
    <div class="title">Puzzle Drop</div>
  </a>

  <a href="#" class="card">
    <div class="machine"><div class="screen"></div><div class="buttons"></div></div>
    <div class="title">Neon Runner</div>
  </a>

  <a href="#" class="card">
    <div class="machine"><div class="screen"></div><div class="buttons"></div></div>
    <div class="title">Zombie Strike</div>
  </a>

  <a href="#" class="card">
    <div class="machine"><div class="screen"></div><div class="buttons"></div></div>
    <div class="title">Tank Battle</div>
  </a>

  <a href="#" class="card">
    <div class="machine"><div class="screen"></div><div class="buttons"></div></div>
    <div class="title">Cyber Jump</div>
  </a>

  <a href="#" class="card">
    <div class="machine"><div class="screen"></div><div class="buttons"></div></div>
    <div class="title">Pixel Quest</div>
  </a>

  <a href="#" class="card">
    <div class="machine"><div class="screen"></div><div class="buttons"></div></div>
    <div class="title">Battle Arena</div>
  </a>

  <a href="#" class="card">

  <a href="#" class="card">

  <a href="#" class="card">
    <div class="machine"><div class="screen"></div><div class="buttons"></div></div>

</div>

</body>
</html>
